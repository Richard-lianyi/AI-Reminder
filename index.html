<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reminder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 30px;
            text-align: left;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 16px;
            margin: 8px 4px;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            min-height: 24px;
            font-weight: bold;
        }

        #result,
        #notifiedResult,
        #completedResult {
            margin-top: 20px;
            text-align: left;
        }

        .item {
            padding: 12px;
            border: 1px solid #ccc;
            margin-top: 10px;
            border-radius: 6px;
        }

        .item button {
            margin-top: 10px;
        }
    </style>
</head>

<body>
<h1>AI Reminder</h1>

<input id="task" type="text" placeholder="Enter your task">
<input id="time" type="datetime-local">

<div>
    <button onclick="addReminder()">Add Reminder</button>
    <button onclick="loadReminders()">Show Reminders</button>
    <button onclick="loadCompleted()">Show Completed</button>
</div>

<p id="message"></p>

<h2>Pending Reminders</h2>
<div id="result"></div>

<h2>Notified Reminders</h2>
<div id="notifiedResult"></div>

<h2>Completed Reminders</h2>
<div id="completedResult"></div>


<script>
    window.onload = function () {
        loadReminders();
        loadNotified();
        loadCompleted();
    };

    async function addReminder() {
        const task = document.getElementById("task").value.trim();
        const rawTime = document.getElementById("time").value;
        const time = rawTime.replace("T", " ");
        const message = document.getElementById("message");

        if (!task || !rawTime) {
            message.innerText = "Please enter both task and time.";
            return;
        }

        try {
            const response = await fetch(
                `http://127.0.0.1:8000/add?task=${encodeURIComponent(task)}&time=${encodeURIComponent(time)}`,
                {
                    method: "POST"
                }
            );

            if (!response.ok) {
                message.innerText = "Failed to add reminder.";
                return;
            }

            message.innerText = "Reminder added successfully.";
            document.getElementById("task").value = "";
            document.getElementById("time").value = "";

            await loadReminders();
            await loadNotified();
            await loadCompleted();
        } catch (error) {
            console.error(error);
            message.innerText = "Request failed. Check backend or CORS settings.";
        }
    }

    async function loadReminders() {
        const result = document.getElementById("result");
        const message = document.getElementById("message");
        result.innerHTML = "";

        try {
            const response = await fetch("http://127.0.0.1:8000/list");

            if (!response.ok) {
                message.innerText = "Failed to load reminders.";
                return;
            }

            const reminders = await response.json();

            if (reminders.length === 0) {
                result.innerHTML = "<p>No pending reminders.</p>";
                return;
            }

            reminders.forEach(reminder => {
                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
                        <div><strong>Task:</strong> ${reminder.task}</div>
                        <div><strong>Time:</strong> ${reminder.time}</div>
                        <button onclick="completeReminder(${reminder.id})">Mark as Done</button>
                        <button onclick="deleteReminder(${reminder.id})">Delete</button>
                    `;

                result.appendChild(div);
            });
        } catch (error) {
            console.error(error);
            message.innerText = "Could not load reminders.";
        }
    }

    async function loadNotified() {
        const notifiedResult = document.getElementById("notifiedResult");
        const message = document.getElementById("message");
        notifiedResult.innerHTML = "";

        try {
            const response = await fetch("http://127.0.0.1:8000/notified");

            if (!response.ok) {
                message.innerText = "Failed to load notified reminders.";
                return;
            }

            const reminders = await response.json();

            if (reminders.length === 0) {
                notifiedResult.innerHTML = "<p>No notified reminders.</p>";
                return;
            }

            reminders.forEach(reminder => {
                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
                <div><strong>Task:</strong> ${reminder.task}</div>
                <div><strong>Time:</strong> ${reminder.time}</div>
                <div><strong>Status:</strong> Notified</div>
                <button onclick="completeReminder(${reminder.id})">Mark as Done</button>
                <button onclick="deleteReminder(${reminder.id})">Delete</button>
            `;

                notifiedResult.appendChild(div);
            });
        } catch (error) {
            console.error(error);
            message.innerText = "Could not load notified reminders.";
        }
    }


    async function loadCompleted() {
        const completedResult = document.getElementById("completedResult");
        const message = document.getElementById("message");
        completedResult.innerHTML = "";

        try {
            const response = await fetch("http://127.0.0.1:8000/completed");

            if (!response.ok) {
                message.innerText = "Failed to load completed reminders.";
                return;
            }

            const reminders = await response.json();

            if (reminders.length === 0) {
                completedResult.innerHTML = "<p>No completed reminders.</p>";
                return;
            }

            reminders.forEach(reminder => {
                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
                        <div><strong>Task:</strong> ${reminder.task}</div>
                        <div><strong>Time:</strong> ${reminder.time}</div>
                        <div><strong>Status:</strong> Completed</div>
                    `;

                completedResult.appendChild(div);
            });
        } catch (error) {
            console.error(error);
            message.innerText = "Could not load completed reminders.";
        }
    }

    async function completeReminder(id) {
        const message = document.getElementById("message");

        try {
            const response = await fetch(`http://127.0.0.1:8000/complete/${id}`, {
                method: "PUT"
            });

            if (!response.ok) {
                message.innerText = "Failed to mark reminder as completed.";
                return;
            }

            message.innerText = "Reminder marked as completed.";
            await loadReminders();
            await loadNotified();
            await loadCompleted();
        } catch (error) {
            console.error(error);
            message.innerText = "Request failed while completing reminder.";
        }
    }

    async function deleteReminder(id) {
        const message = document.getElementById("message");
        if (!confirm("Are you sure you want to delete this reminder?")) {
            return;
        }

        try {
            const response = await fetch(`http://127.0.0.1:8000/delete/${id}`, {
                method: "DELETE"
            });

            if (!response.ok) {
                message.innerText = "Failed to delete reminder.";
                return;
            }

            message.innerText = "Reminder deleted successfully.";
            await loadReminders();
            await loadNotified();
            await loadCompleted();
        } catch (error) {
            console.error(error);
            message.innerText = "Request failed while deleting reminder.";
        }
    }
</script>
</body>

</html>
