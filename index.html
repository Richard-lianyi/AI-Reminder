<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reminder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 30px;
            text-align: left;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 16px;
            margin: 8px 4px;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            min-height: 24px;
            font-weight: bold;
        }

        #result,
        #completedResult {
            margin-top: 20px;
            text-align: left;
        }

        .item {
            padding: 12px;
            border: 1px solid #ccc;
            margin-top: 10px;
            border-radius: 6px;
        }

        .item button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>AI Reminder</h1>

    <input id="task" type="text" placeholder="Enter your task">
    <input id="time" type="text" placeholder="YYYY-MM-DD HH:MM">

    <div>
        <button onclick="addReminder()">Add Reminder</button>
        <button onclick="loadReminders()">Show Reminders</button>
        <button onclick="loadCompleted()">Show Completed</button>
    </div>

    <p id="message"></p>

    <h2>Pending Reminders</h2>
    <div id="result"></div>

    <h2>Completed Reminders</h2>
    <div id="completedResult"></div>

    <script>
        async function addReminder() {
            const task = document.getElementById("task").value.trim();
            const time = document.getElementById("time").value.trim();
            const message = document.getElementById("message");

            if (!task || !time) {
                message.innerText = "Please enter both task and time.";
                return;
            }

            try {
                const response = await fetch(
                    `http://127.0.0.1:8000/add?task=${encodeURIComponent(task)}&time=${encodeURIComponent(time)}`,
                    {
                        method: "POST"
                    }
                );

                if (!response.ok) {
                    message.innerText = "Failed to add reminder.";
                    return;
                }

                message.innerText = "Reminder added successfully.";
                document.getElementById("task").value = "";
                document.getElementById("time").value = "";

                await loadReminders();
                await loadCompleted();
            } catch (error) {
                console.error(error);
                message.innerText = "Request failed. Check backend or CORS settings.";
            }
        }

        async function loadReminders() {
            const result = document.getElementById("result");
            const message = document.getElementById("message");
            result.innerHTML = "";

            try {
                const response = await fetch("http://127.0.0.1:8000/list");

                if (!response.ok) {
                    message.innerText = "Failed to load reminders.";
                    return;
                }

                const reminders = await response.json();

                if (reminders.length === 0) {
                    result.innerHTML = "<p>No pending reminders.</p>";
                    return;
                }

                reminders.forEach(reminder => {
                    const div = document.createElement("div");
                    div.className = "item";

                    div.innerHTML = `
                        <div><strong>Task:</strong> ${reminder[1]}</div>
                        <div><strong>Time:</strong> ${reminder[2]}</div>
                        <button onclick="deleteReminder(${reminder[0]})">Delete</button>
                    `;

                    result.appendChild(div);
                });
            } catch (error) {
                console.error(error);
                message.innerText = "Could not load reminders.";
            }
        }

        async function loadCompleted() {
            const completedResult = document.getElementById("completedResult");
            const message = document.getElementById("message");
            completedResult.innerHTML = "";

            try {
                const response = await fetch("http://127.0.0.1:8000/completed");

                if (!response.ok) {
                    message.innerText = "Failed to load completed reminders.";
                    return;
                }

                const reminders = await response.json();

                if (reminders.length === 0) {
                    completedResult.innerHTML = "<p>No completed reminders.</p>";
                    return;
                }

                reminders.forEach(reminder => {
                    const div = document.createElement("div");
                    div.className = "item";

                    div.innerHTML = `
                        <div><strong>Task:</strong> ${reminder[1]}</div>
                        <div><strong>Time:</strong> ${reminder[2]}</div>
                        <div><strong>Status:</strong> Completed</div>
                    `;

                    completedResult.appendChild(div);
                });
            } catch (error) {
                console.error(error);
                message.innerText = "Could not load completed reminders.";
            }
        }

        async function deleteReminder(id) {
            const message = document.getElementById("message");

            try {
                const response = await fetch(`http://127.0.0.1:8000/delete/${id}`, {
                    method: "DELETE"
                });

                if (!response.ok) {
                    message.innerText = "Failed to delete reminder.";
                    return;
                }

                message.innerText = "Reminder deleted successfully.";
                await loadReminders();
                await loadCompleted();
            } catch (error) {
                console.error(error);
                message.innerText = "Request failed while deleting reminder.";
            }
        }
    </script>
</body>
</html>
